<p class="auto-style5"><font class="auto-style2">All bows and their screws must be lubricated

<p><span class="auto-style4">One of the best ways is </span>
<font class="auto-style2"><span class="auto-style5">&nbsp;using a grease stick.</span></font></p>
<p><span class="auto-style4">They are </span>
<font class="auto-style2"><span class="auto-style5">available in most local hardware 
stores. </span> </font></p>
<p><font class="auto-style2"><span class="auto-style5">You may also use soft paraffin from your a
